<script>
        let horsesData = [];
        let currentFilter = 'ALL';
        let searchQuery = '';
        const DEFAULT_DISPLAY_LIMIT = 30; 
        const SEARCH_DISPLAY_LIMIT = 100; 

        // 恢復的點擊計數變數
        let secretClickCount = 0;
        let isSecretUnlocked = false;

        window.onload = async function() {
            const themeIcon = document.getElementById('theme-icon');
            if (document.documentElement.classList.contains('dark')) {
                if (themeIcon) themeIcon.className = 'fa-solid fa-sun';
            } else {
                if (themeIcon) themeIcon.className = 'fa-solid fa-moon';
            }
            await loadHorsesData();
        };

        async function loadHorsesData() {
            let rawData = [];
            try {
                const response = await fetch(`horses.json?_t=${Date.now()}`);
                if (response.ok) {
                    rawData = await response.json();
                }
            } catch (e) {
                console.warn("載入資料失敗。");
                rawData = [];
            }

            const uniqueMap = new Map();
            let duplicateCount = 0;

            rawData.forEach(item => {
                const uniqueKey = `${(item.mandarin||'').trim()}_${(item.original||'').trim()}`;
                if (uniqueKey !== "_" && uniqueMap.has(uniqueKey)) {
                    duplicateCount++;
                } else {
                    uniqueMap.set(uniqueKey, item);
                }
            });

            horsesData = Array.from(uniqueMap.values());

            if (duplicateCount > 0) {
                const dedupNotice = document.getElementById('dedup-notice');
                dedupNotice.textContent = `⚠️ 載入時已自動過濾 ${duplicateCount} 筆重複資料`;
                dedupNotice.classList.remove('hidden');
                setTimeout(() => dedupNotice.classList.add('hidden'), 5000);
            }

            renderHorses();
        }

        // ================= 站長專屬功能 =================
        function triggerSecretClick() {
            secretClickCount++;
            if (secretClickCount >= 5) {
                attemptUnlockSecretMode();
                secretClickCount = 0;
            }
        }

        function attemptUnlockSecretMode() {
            if (isSecretUnlocked) {
                isSecretUnlocked = false;
                document.getElementById('admin-section').classList.add('hidden');
                showToast("🔒 編輯模式已鎖定。");
            } else {
                const pwd = prompt("請輸入站長解鎖密碼：");
                if (pwd === "openthegate") {
                    isSecretUnlocked = true;
                    document.getElementById('admin-section').classList.remove('hidden');
                    document.getElementById('export-section').classList.add('hidden'); 
                    showToast("🔓 密碼正確！批量新增後台已解鎖。");
                } else if (pwd !== null) {
                    showToast("❌ 密碼錯誤。");
                }
            }
        }

        function handleBatchAdd() {
            const inputTxt = document.getElementById('batch-input').value.trim();
            if (!inputTxt) {
                showToast("⚠️ 請先在輸入框內貼上賽駒資料");
                return;
            }

            const lines = inputTxt.split('\n');
            let successCount = 0;
            let skipCount = 0;
            let conflictDetails = [];
            let newlyAddedBatch = []; 

            lines.forEach((line, index) => {
                const cleanLine = line.trim();
                if (!cleanLine) return;

                const parts = cleanLine.split(/\t|,/).map(s => s.trim());
                
                if (parts.length < 3) {
                    skipCount++;
                    conflictDetails.push(`第 ${index + 1} 行欄位不足，已跳過。`);
                    return;
                }

                const origin = parts[0].toUpperCase();
                const mandarin = parts[1];
                const original = parts[2];
                const en = parts[3] || original; 
                const birth = parts[4] || "";

                const conflictHorse = horsesData.find(h => 
                    (h.original && h.original.toLowerCase() === original.toLowerCase()) || 
                    (h.en && en && h.en.toLowerCase() === en.toLowerCase())
                );

                if (conflictHorse) {
                    skipCount++;
                    conflictDetails.push(`第 ${index + 1} 行：[${original}] 與已收錄的「${conflictHorse.mandarin}」衝突。`);
                    return;
                }

                const newHorse = { origin, mandarin, original, en };
                if (birth) newHorse.birth = birth;

                horsesData.unshift(newHorse);
                newlyAddedBatch.push(newHorse);
                successCount++;
            });

            if (skipCount > 0) {
                alert(`批量處理完畢！\n✅ 成功新增：${successCount} 筆\n⚠️ 略過衝突：${skipCount} 筆\n\n【略過原因】\n${conflictDetails.join('\n')}`);
            } else if (successCount > 0) {
                showToast(`✅ 完美！成功批量新增 ${successCount} 匹賽駒。`);
            }

            if (successCount > 0) {
                document.getElementById('batch-input').value = ''; 
                renderHorses();
                updateExportJson(newlyAddedBatch); 
            }
        }

        function updateExportJson(newBatch) {
            const exportSection = document.getElementById('export-section');
            const textarea = document.getElementById('export-textarea');
            let jsonString = JSON.stringify(newBatch, null, 2);
            jsonString = jsonString.substring(jsonString.indexOf('\n') + 1, jsonString.lastIndexOf('\n'));
            jsonString = jsonString + ",";
            textarea.value = jsonString;
            exportSection.classList.remove('hidden');
        }

        function copyExportJson() {
            const textarea = document.getElementById('export-textarea');
            textarea.select();
            document.execCommand('copy');
            showToast("📋 增量代碼已複製！請貼至 GitHub horses.json 第一行 [ 的下方");
        }

        function showToast(message) {
            const toast = document.getElementById('toast-notification');
            document.getElementById('toast-message').textContent = message;
            toast.classList.remove('-translate-y-full');
            setTimeout(() => toast.classList.add('-translate-y-full'), 3000);
        }

        function setFilter(filterType) {
            currentFilter = filterType;
            ['ALL', 'JP', 'EN'].forEach(type => {
                const btn = document.getElementById(`btn-${type}`);
                if (type === filterType) {
                    btn.className = "px-4 py-1.5 rounded-full text-xs font-semibold bg-accent text-white dark:bg-accent-dark dark:text-parchment-dark shadow-sm transition-all";
                } else {
                    btn.className = "px-4 py-1.5 rounded-full text-xs font-semibold text-stone-600 dark:text-stone-400 hover:bg-stone-200/60 dark:hover:bg-stone-700/50 transition-all";
                }
            });
            renderHorses();
        }

        function handleSearch() {
            searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
            renderHorses();
        }

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function renderHorses() {
            const container = document.getElementById('horses-grid');
            const countLabel = document.getElementById('result-count');
            container.innerHTML = '';

            const filtered = horsesData.filter(h => {
                const matchCategory = currentFilter === 'ALL' || h.origin === currentFilter;
                const matchSearch = !searchQuery || 
                    (h.mandarin && h.mandarin.toLowerCase().includes(searchQuery)) ||
                    (h.original && h.original.toLowerCase().includes(searchQuery)) ||
                    (h.en && h.en.toLowerCase().includes(searchQuery)) ||
                    (h.birth && String(h.birth).toLowerCase().includes(searchQuery));
                return matchCategory && matchSearch;
            });

            let finalDisplayList = filtered;

            if (!searchQuery) {
                const shuffled = shuffleArray(filtered);
                finalDisplayList = shuffled.slice(0, DEFAULT_DISPLAY_LIMIT);
                
                if (filtered.length > DEFAULT_DISPLAY_LIMIT) {
                    countLabel.textContent = `隨機顯示 ${finalDisplayList.length} / 共收錄 ${filtered.length} 筆`;
                } else {
                    countLabel.textContent = `顯示 ${finalDisplayList.length} / 共收錄 ${filtered.length} 筆`;
                }
            } else {
                if (filtered.length > SEARCH_DISPLAY_LIMIT) {
                    finalDisplayList = filtered.slice(0, SEARCH_DISPLAY_LIMIT);
                    countLabel.textContent = `僅顯示前 ${SEARCH_DISPLAY_LIMIT} 筆結果 (符合條件共 ${filtered.length} 筆)`;
                } else {
                    countLabel.textContent = `搜尋結果：${finalDisplayList.length} 筆 (共收錄 ${horsesData.length} 筆)`;
                }
            }

            if (finalDisplayList.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-16 font-serif text-stone-400 dark:text-stone-600">
                        <i class="fa-solid fa-horse-head text-3xl mb-3 opacity-50"></i>
                        <p>查無對應馬名，請嘗試其他關鍵字。</p>
                    </div>`;
                return;
            }

            finalDisplayList.forEach(horse => {
                const isJP = horse.origin === 'JP';
                const tagColor = isJP 
                    ? "bg-amber-100/80 text-amber-900 dark:bg-amber-950/60 dark:text-amber-300 border-amber-300/50" 
                    : "bg-blue-100/80 text-blue-900 dark:bg-blue-950/60 dark:text-blue-300 border-blue-300/50";
                const badgeLabel = isJP ? "JP 日文原名" : "EN 英文原名";

                const birthHtml = horse.birth 
                    ? `<span class="text-[11px] font-sans font-normal text-stone-400 dark:text-stone-500 ml-1.5 shrink-0">b. ${horse.birth}</span>` 
                    : '';

                const card = document.createElement('div');
                card.className = "bg-white/60 dark:bg-stone-900/50 border border-stone-200/70 dark:border-stone-800 rounded-xl p-4 flex flex-col justify-between hover:border-accent dark:hover:border-accent-dark transition-all duration-200 shadow-sm hover:shadow";
                
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-baseline gap-1.5 mb-2 border-b border-stone-200/50 dark:border-stone-800/80 pb-2">
                            <div class="flex items-baseline overflow-hidden">
                                <span class="font-serif text-lg font-bold text-stone-800 dark:text-stone-100 tracking-wide truncate">${horse.mandarin || ''}</span>
                                ${birthHtml}
                            </div>
                            <span class="text-[10px] font-semibold px-2 py-0.5 rounded border ${tagColor} shrink-0 self-center">${badgeLabel}</span>
                        </div>
                        <div class="space-y-1 font-mono text-xs pt-1">
                            <div class="text-accent dark:text-accent-dark font-semibold text-sm leading-snug">${horse.original || ''}</div>
                            ${horse.en && horse.en !== horse.original ? `<div class="text-stone-500 dark:text-stone-400 text-xs">${horse.en}</div>` : ''}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            const themeIcon = document.getElementById('theme-icon');
            if (isDark) {
                if (themeIcon) themeIcon.className = 'fa-solid fa-sun';
                localStorage.setItem('theme', 'dark');
            } else {
                if (themeIcon) themeIcon.className = 'fa-solid fa-moon';
                localStorage.setItem('theme', 'light');
            }
        }
    </script>
